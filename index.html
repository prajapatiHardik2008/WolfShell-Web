    }

  padding: 8px 0;

  border-bottom: 1px solid rgba(0, 255, 156, 0.4);

  text-shadow: 0 0 6px rgba(0, 255, 156, 0.6);
}

    .commandRunner

    }
    .commandRunner:hover
    {

.terminal-body::-webkit-scrollbar {

}

.terminal-body::-webkit-scrollbar-track {

  background-color: #00ff9c;
  border-radius: 4px;
}
